name: smart_cart
description: "A Flutter E-commerce application with MVVM architecture and Firebase backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.10

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4

  # State Management (MVVM)
  provider: ^6.1.2

  # Image Picker (Admin panel)
  image_picker: ^1.1.2

  # UUID for order IDs
  uuid: ^4.5.1

  # Intl for formatting
  intl: ^0.20.2
  razorpay_flutter: ^1.3.8
  shared_preferences: ^2.5.1
  http: ^1.2.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/e-commerce.png"
